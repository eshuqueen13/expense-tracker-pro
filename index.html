<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="top-bar">
<h1>Expense Tracker Pro</h1>
<button id="themeBtn">🌙</button>
</div>

<div class="cards">

<div class="card">
<h3>Balance</h3>
<h2 id="balance">₹0</h2>
</div>

<div class="card income">
<h3>Income</h3>
<h2 id="income">₹0</h2>
</div>

<div class="card expense">
<h3>Expense</h3>
<h2 id="expense">₹0</h2>
</div>

</div>

<form id="form">

<input
type="text"
id="text"
placeholder="Description"
required
>

<input
type="number"
id="amount"
placeholder="Amount"
required
>

<input
type="date"
id="date"
required
>

<select id="category">
<option>Food</option>
<option>Travel</option>
<option>Shopping</option>
<option>Bills</option>
<option>Salary</option>
<option>Other</option>
</select>

<button type="submit">
Add Transaction
</button>

</form>

<input
type="text"
id="search"
placeholder="Search Transaction..."
>

<h3>Transaction History</h3>

<ul id="list"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
